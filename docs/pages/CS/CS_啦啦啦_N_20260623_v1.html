<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoE Action Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --teal: #2AACA2;
    --teal-light: #e8f7f6;
    --teal-mid: #b2e0dc;
    --dark: #1a2a2a;
    --mid: #4a6060;
    --light: #f4f8f8;
    --white: #ffffff;
    --border: #d4ecea;

    --status-not-started-bg: #f1f3f5;
    --status-not-started-text: #6c757d;
    --status-in-progress-bg: #fff8e1;
    --status-in-progress-text: #b78000;
    --status-done-bg: #e8f7f0;
    --status-done-text: #1a7a4a;
    --status-blocked-bg: #fdecea;
    --status-blocked-text: #c0392b;

    --urgent-high-bg: #fdecea;
    --urgent-high-text: #c0392b;
    --urgent-mid-bg: #fff8e1;
    --urgent-mid-text: #b78000;
    --urgent-low-bg: #e8f7f0;
    --urgent-low-text: #1a7a4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Microsoft JhengHei', sans-serif;
    background: var(--light);
    color: var(--dark);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* TOP BAR */
  .topbar { background: var(--teal); height: 3px; }

  /* HEADER */
  .header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 8px rgba(42,172,162,0.06);
  }

  .header-left { display: flex; align-items: center; gap: 16px; }

  .logo { display: flex; align-items: center; gap: 8px; }

  .logo-dot { width: 8px; height: 8px; background: var(--teal); border-radius: 50%; }

  .logo-name { font-size: 13px; font-weight: 700; color: var(--teal); letter-spacing: 0.04em; }

  .header-title {
    font-size: 15px; font-weight: 600; color: var(--dark);
    padding-left: 16px; border-left: 1px solid var(--border);
  }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .stat-pill {
    background: var(--teal-light); color: var(--teal);
    font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px;
    white-space: nowrap;
  }

  .btn-add {
    background: var(--teal); color: white;
    font-size: 12px; font-weight: 600;
    padding: 7px 14px; border-radius: 7px;
    border: none; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: background 0.15s;
  }

  .btn-add:hover { background: #1d8a81; }

  /* FILTER BAR */
  .filterbar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-label { font-size: 11px; font-weight: 600; color: var(--mid); margin-right: 4px; }

  .filter-btn {
    font-size: 11px; font-weight: 500;
    padding: 4px 10px; border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--white); color: var(--mid);
    cursor: pointer; transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--teal); color: white; border-color: var(--teal);
  }

  .filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

  /* MAIN */
  .main { padding: 24px 32px 60px; }

  /* TABLE WRAPPER */
  .table-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(42,172,162,0.05);
  }

  /* TABLE */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead tr {
    background: var(--teal);
  }

  thead th {
    color: white;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 11px 14px;
    text-align: left;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    position: relative;
  }

  thead th:hover { background: #1d8a81; }

  thead th .sort-icon { margin-left: 4px; opacity: 0.5; font-size: 9px; }

  thead th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }

  tbody tr:hover { background: #f9fdfd; }

  tbody tr.hidden { display: none; }

  td {
    padding: 10px 14px;
    color: var(--mid);
    vertical-align: middle;
  }

  td.task-name {
    color: var(--dark);
    font-weight: 500;
    max-width: 220px;
  }

  td.remark {
    color: var(--mid);
    font-size: 12px;
    max-width: 180px;
  }

  /* STATUS BADGE */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600;
    padding: 3px 9px; border-radius: 20px;
    white-space: nowrap; cursor: pointer;
  }

  .badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  .badge-not-started {
    background: var(--status-not-started-bg);
    color: var(--status-not-started-text);
  }

  .badge-not-started .badge-dot { background: var(--status-not-started-text); }

  .badge-in-progress {
    background: var(--status-in-progress-bg);
    color: var(--status-in-progress-text);
  }

  .badge-in-progress .badge-dot { background: var(--status-in-progress-text); }

  .badge-done {
    background: var(--status-done-bg);
    color: var(--status-done-text);
  }

  .badge-done .badge-dot { background: var(--status-done-text); }

  .badge-blocked {
    background: var(--status-blocked-bg);
    color: var(--status-blocked-text);
  }

  .badge-blocked .badge-dot { background: var(--status-blocked-text); }

  /* URGENT BADGE */
  .urgent {
    display: inline-block;
    font-size: 11px; font-weight: 600;
    padding: 3px 9px; border-radius: 4px;
    white-space: nowrap;
  }

  .urgent-high { background: var(--urgent-high-bg); color: var(--urgent-high-text); }
  .urgent-mid  { background: var(--urgent-mid-bg);  color: var(--urgent-mid-text);  }
  .urgent-low  { background: var(--urgent-low-bg);  color: var(--urgent-low-text);  }

  /* DDL */
  .ddl { font-size: 12px; white-space: nowrap; }
  .ddl.overdue { color: #c0392b; font-weight: 600; }
  .ddl.soon { color: #b78000; font-weight: 600; }
  .ddl.ok { color: var(--mid); }

  /* LINK */
  .doc-link {
    color: var(--teal); font-size: 12px;
    text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
  }

  .doc-link:hover { text-decoration: underline; }

  /* EDITABLE CELL */
  [contenteditable="true"] {
    outline: none;
    border-radius: 4px;
    padding: 2px 4px;
    min-width: 40px;
    transition: background 0.15s;
  }

  [contenteditable="true"]:focus {
    background: var(--teal-light);
    box-shadow: 0 0 0 2px var(--teal-mid);
  }

  /* STATUS DROPDOWN */
  .status-select {
    appearance: none;
    border: none; background: transparent;
    font-family: inherit; font-size: 11px; font-weight: 600;
    cursor: pointer; padding: 0;
  }

  /* ADD ROW */
  .add-row td {
    padding: 8px 14px;
  }

  .btn-add-row {
    background: none; border: none; cursor: pointer;
    color: var(--teal); font-size: 12px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px; border-radius: 6px;
    transition: background 0.15s;
  }

  .btn-add-row:hover { background: var(--teal-light); }

  /* SUMMARY BAR */
  .summary {
    display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap;
  }

  .summary-card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 18px;
    display: flex; align-items: center; gap: 10px;
    flex: 1; min-width: 120px;
  }

  .summary-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .summary-label { font-size: 11px; color: var(--mid); }

  .summary-count { font-size: 20px; font-weight: 700; color: var(--dark); line-height: 1; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 200;
    align-items: center; justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white); border-radius: 14px;
    padding: 28px 32px; width: 480px; max-width: 95vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }

  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--dark); }

  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }

  .modal-field { display: flex; flex-direction: column; gap: 5px; }

  .modal-field.full { grid-column: 1 / -1; }

  .modal-field label { font-size: 11px; font-weight: 600; color: var(--mid); text-transform: uppercase; letter-spacing: 0.08em; }

  .modal-field input, .modal-field select, .modal-field textarea {
    font-family: inherit; font-size: 13px;
    border: 1px solid var(--border); border-radius: 7px;
    padding: 8px 10px; color: var(--dark);
    background: var(--white);
    transition: border 0.15s;
  }

  .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus {
    outline: none; border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-light);
  }

  .modal-field textarea { resize: vertical; min-height: 60px; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  .btn-cancel {
    background: var(--light); color: var(--mid);
    border: 1px solid var(--border); border-radius: 7px;
    padding: 8px 18px; font-size: 13px; font-weight: 500;
    cursor: pointer;
  }

  .btn-confirm {
    background: var(--teal); color: white;
    border: none; border-radius: 7px;
    padding: 8px 18px; font-size: 13px; font-weight: 600;
    cursor: pointer;
  }

  .btn-confirm:hover { background: #1d8a81; }

  @media (max-width: 768px) {
    .header, .filterbar, .main { padding-left: 16px; padding-right: 16px; }
    .summary-card { min-width: 80px; }
  }
</style>
</head>
<body>

<div class="topbar"></div>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">
      <div class="logo-dot"></div>
      <div class="logo-name">PROFET AI ／ CoE</div>
    </div>
    <div class="header-title">Action Tracker</div>
  </div>
  <div class="header-right">
    <div class="stat-pill" id="total-pill">共 0 筆</div>
    <button class="btn-add" onclick="openModal()">＋ 新增任務</button>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filterbar">
  <span class="filter-label">狀態</span>
  <button class="filter-btn active" onclick="filterStatus('all', this)">全部</button>
  <button class="filter-btn" onclick="filterStatus('未開始', this)">未開始</button>
  <button class="filter-btn" onclick="filterStatus('進行中', this)">進行中</button>
  <button class="filter-btn" onclick="filterStatus('已完成', this)">已完成</button>
  <button class="filter-btn" onclick="filterStatus('擱置中', this)">擱置中</button>
  <div class="filter-sep"></div>
  <span class="filter-label">緊急程度</span>
  <button class="filter-btn" onclick="filterUrgent('all-u', this)">全部</button>
  <button class="filter-btn" onclick="filterUrgent('高', this)">高</button>
  <button class="filter-btn" onclick="filterUrgent('中', this)">中</button>
  <button class="filter-btn" onclick="filterUrgent('低', this)">低</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SUMMARY -->
  <div class="summary" id="summary-bar">
    <div class="summary-card">
      <div class="summary-dot" style="background:var(--status-not-started-text)"></div>
      <div>
        <div class="summary-label">未開始</div>
        <div class="summary-count" id="cnt-not">0</div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-dot" style="background:var(--status-in-progress-text)"></div>
      <div>
        <div class="summary-label">進行中</div>
        <div class="summary-count" id="cnt-in">0</div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-dot" style="background:var(--status-done-text)"></div>
      <div>
        <div class="summary-label">已完成</div>
        <div class="summary-count" id="cnt-done">0</div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-dot" style="background:var(--status-blocked-text)"></div>
      <div>
        <div class="summary-label">擱置中</div>
        <div class="summary-count" id="cnt-block">0</div>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table id="tracker-table">
      <thead>
        <tr>
          <th onclick="sortTable(0)">狀態 <span class="sort-icon">↕</span></th>
          <th onclick="sortTable(1)">Owner <span class="sort-icon">↕</span></th>
          <th onclick="sortTable(2)">部門 <span class="sort-icon">↕</span></th>
          <th onclick="sortTable(3)" style="min-width:200px;">任務 <span class="sort-icon">↕</span></th>
          <th onclick="sortTable(4)">緊急程度 <span class="sort-icon">↕</span></th>
          <th>資料連結</th>
          <th onclick="sortTable(6)">DDL <span class="sort-icon">↕</span></th>
          <th style="min-width:140px;">備註</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody">
      </tbody>
      <tfoot>
        <tr class="add-row">
          <td colspan="9">
            <button class="btn-add-row" onclick="openModal()">＋ 新增任務</button>
          </td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>新增任務</h3>
    <div class="modal-grid">
      <div class="modal-field">
        <label>狀態</label>
        <select id="m-status">
          <option value="未開始">未開始</option>
          <option value="進行中">進行中</option>
          <option value="已完成">已完成</option>
          <option value="擱置中">擱置中</option>
        </select>
      </div>
      <div class="modal-field">
        <label>緊急程度</label>
        <select id="m-urgent">
          <option value="高">高</option>
          <option value="中" selected>中</option>
          <option value="低">低</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Owner</label>
        <input id="m-owner" type="text" placeholder="姓名">
      </div>
      <div class="modal-field">
        <label>部門</label>
        <input id="m-dept" type="text" placeholder="部門">
      </div>
      <div class="modal-field full">
        <label>任務</label>
        <input id="m-task" type="text" placeholder="任務說明">
      </div>
      <div class="modal-field">
        <label>DDL</label>
        <input id="m-ddl" type="date">
      </div>
      <div class="modal-field">
        <label>資料連結</label>
        <input id="m-link" type="url" placeholder="https://...">
      </div>
      <div class="modal-field full">
        <label>備註</label>
        <textarea id="m-remark" placeholder="補充說明..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-confirm" onclick="addRow()">新增</button>
    </div>
  </div>
</div>

<script>
  // ── 初始資料 ──
  const initData = [
    { status:'未開始', owner:'Sunny', dept:'CoE', task:'Manager Meeting Review — 完成 CS 部分', urgent:'中', link:'', ddl:'2026-06-26', remark:'' },
    { status:'未開始', owner:'', dept:'CoE', task:'設計案例分享會 AIS Agent 自動化流程架構', urgent:'高', link:'', ddl:'', remark:'實習生專案第一週交付' },
    { status:'未開始', owner:'', dept:'CoE', task:'評估考試平台：Moodle vs 自建系統', urgent:'中', link:'', ddl:'', remark:'第一週討論後確認' },
    { status:'未開始', owner:'', dept:'CoE', task:'Agent 1 設計：會議摘要生成', urgent:'中', link:'', ddl:'', remark:'' },
    { status:'未開始', owner:'', dept:'CoE', task:'Agent 2 設計：考題自動生成', urgent:'中', link:'', ddl:'', remark:'' },
    { status:'未開始', owner:'', dept:'CoE', task:'Agent 3 設計：會後信件草稿整合', urgent:'中', link:'', ddl:'', remark:'' },
    { status:'未開始', owner:'', dept:'CoE', task:'Agent 4A 設計：業務表單自動評分＋燈號', urgent:'中', link:'', ddl:'', remark:'評分標準已確認，參考 PDF' },
    { status:'未開始', owner:'', dept:'CoE', task:'整合測試：完整跑一次案例分享會流程', urgent:'中', link:'', ddl:'', remark:'第 6 週執行' },
    { status:'未開始', owner:'', dept:'CoE', task:'評分統計視覺化圖表製作', urgent:'低', link:'', ddl:'', remark:'' },
    { status:'未開始', owner:'', dept:'CoE', task:'使用說明文件撰寫', urgent:'低', link:'', ddl:'', remark:'讓任何人都能接手使用' },
    { status:'未開始', owner:'', dept:'CoE', task:'CEO 發表簡報製作（10 頁以內）', urgent:'中', link:'', ddl:'', remark:'第 7 週完成初稿' },
    { status:'未開始', owner:'', dept:'CoE', task:'CEO 正式發表', urgent:'高', link:'', ddl:'', remark:'第 8 週，20 分鐘含 Q&A' },
  ];

  let currentStatusFilter = 'all';
  let currentUrgentFilter = 'all-u';
  let sortCol = -1;
  let sortAsc = true;

  const tbody = document.getElementById('tbody');

  function statusClass(s) {
    if (s === '未開始') return 'badge-not-started';
    if (s === '進行中') return 'badge-in-progress';
    if (s === '已完成') return 'badge-done';
    if (s === '擱置中') return 'badge-blocked';
    return 'badge-not-started';
  }

  function urgentClass(u) {
    if (u === '高') return 'urgent-high';
    if (u === '中') return 'urgent-mid';
    return 'urgent-low';
  }

  function ddlClass(ddl) {
    if (!ddl) return 'ok';
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(ddl);
    const diff = (d - today) / 86400000;
    if (diff < 0) return 'overdue';
    if (diff <= 3) return 'soon';
    return 'ok';
  }

  function ddlDisplay(ddl) {
    if (!ddl) return '—';
    const [y,m,d] = ddl.split('-');
    return `${m}/${d}`;
  }

  function cycleStatus(badge, row) {
    const states = ['未開始','進行中','已完成','擱置中'];
    const cur = badge.dataset.status;
    const next = states[(states.indexOf(cur)+1) % states.length];
    badge.dataset.status = next;
    badge.className = `badge ${statusClass(next)}`;
    badge.innerHTML = `<span class="badge-dot"></span>${next}`;
    row.dataset.status = next;
    applyFilters();
    updateCounts();
  }

  function renderRow(d, idx) {
    const tr = document.createElement('tr');
    tr.dataset.status = d.status;
    tr.dataset.urgent = d.urgent;

    const dc = ddlClass(d.ddl);

    tr.innerHTML = `
      <td>
        <span class="badge ${statusClass(d.status)}" data-status="${d.status}" onclick="cycleStatus(this, this.closest('tr'))" title="點擊切換狀態">
          <span class="badge-dot"></span>${d.status}
        </span>
      </td>
      <td><span contenteditable="true">${d.owner}</span></td>
      <td><span contenteditable="true">${d.dept}</span></td>
      <td class="task-name"><span contenteditable="true">${d.task}</span></td>
      <td><span class="urgent ${urgentClass(d.urgent)}">${d.urgent}</span></td>
      <td>${d.link ? `<a class="doc-link" href="${d.link}" target="_blank">🔗 連結</a>` : '<span style="color:var(--border);">—</span>'}</td>
      <td><span class="ddl ${dc}">${ddlDisplay(d.ddl)}</span></td>
      <td class="remark"><span contenteditable="true">${d.remark}</span></td>
      <td><button onclick="deleteRow(this)" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:2px 4px;" title="刪除">✕</button></td>
    `;
    tbody.appendChild(tr);
  }

  function deleteRow(btn) {
    btn.closest('tr').remove();
    updateCounts();
    updateTotal();
  }

  function updateCounts() {
    const rows = [...tbody.querySelectorAll('tr')];
    document.getElementById('cnt-not').textContent  = rows.filter(r=>r.dataset.status==='未開始').length;
    document.getElementById('cnt-in').textContent   = rows.filter(r=>r.dataset.status==='進行中').length;
    document.getElementById('cnt-done').textContent = rows.filter(r=>r.dataset.status==='已完成').length;
    document.getElementById('cnt-block').textContent= rows.filter(r=>r.dataset.status==='擱置中').length;
    updateTotal();
  }

  function updateTotal() {
    document.getElementById('total-pill').textContent = `共 ${tbody.querySelectorAll('tr').length} 筆`;
  }

  function applyFilters() {
    tbody.querySelectorAll('tr').forEach(tr => {
      const statusOk = currentStatusFilter === 'all' || tr.dataset.status === currentStatusFilter;
      const urgentOk = currentUrgentFilter === 'all-u' || tr.dataset.urgent === currentUrgentFilter;
      tr.classList.toggle('hidden', !(statusOk && urgentOk));
    });
  }

  function filterStatus(val, btn) {
    currentStatusFilter = val;
    document.querySelectorAll('.filterbar .filter-btn').forEach(b => {
      if (['all','未開始','進行中','已完成','擱置中'].includes(b.textContent.trim()) ||
          b.textContent.trim() === '全部') {
        b.classList.remove('active');
      }
    });
    btn.classList.add('active');
    applyFilters();
  }

  function filterUrgent(val, btn) {
    currentUrgentFilter = val;
    // 只重設緊急度那組按鈕
    document.querySelectorAll('.filterbar .filter-btn').forEach(b => {
      if (['all-u','高','中','低'].some(v => b.onclick && b.onclick.toString().includes(v))) {
        b.classList.remove('active');
      }
    });
    btn.classList.add('active');
    applyFilters();
  }

  function sortTable(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }

    const rows = [...tbody.querySelectorAll('tr')];
    rows.sort((a,b) => {
      const aVal = a.cells[col]?.textContent.trim() || '';
      const bVal = b.cells[col]?.textContent.trim() || '';
      return sortAsc ? aVal.localeCompare(bVal,'zh') : bVal.localeCompare(aVal,'zh');
    });
    rows.forEach(r => tbody.appendChild(r));

    document.querySelectorAll('thead th').forEach((th,i) => {
      th.classList.toggle('sorted', i === col);
      const icon = th.querySelector('.sort-icon');
      if (icon) icon.textContent = i===col ? (sortAsc?'↑':'↓') : '↕';
    });
  }

  function openModal() {
    document.getElementById('modal').classList.add('open');
    document.getElementById('m-task').focus();
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    ['m-status','m-urgent','m-owner','m-dept','m-task','m-ddl','m-link','m-remark'].forEach(id => {
      const el = document.getElementById(id);
      if (el.tagName === 'SELECT') el.selectedIndex = id==='m-urgent'?1:0;
      else el.value = '';
    });
  }

  function addRow() {
    const task = document.getElementById('m-task').value.trim();
    if (!task) { document.getElementById('m-task').focus(); return; }

    renderRow({
      status: document.getElementById('m-status').value,
      owner:  document.getElementById('m-owner').value,
      dept:   document.getElementById('m-dept').value,
      task,
      urgent: document.getElementById('m-urgent').value,
      link:   document.getElementById('m-link').value,
      ddl:    document.getElementById('m-ddl').value,
      remark: document.getElementById('m-remark').value,
    });
    closeModal();
    applyFilters();
    updateCounts();
  }

  // ESC 關閉 modal
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  // Enter 送出 modal
  document.getElementById('m-task').addEventListener('keydown', e => {
    if (e.key === 'Enter') addRow();
  });

  // 初始化
  initData.forEach(renderRow);
  updateCounts();
</script>

</body>
</html>
