<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>受密碼保護的頁面</title>
  <style>
    *{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;background:#f4f2ea;color:#17211b;font-family:system-ui,sans-serif}
    main{width:min(420px,100%);padding:30px;border:1px solid #d5ddd7;border-radius:20px;background:white;box-shadow:0 25px 80px #17211b18}
    .lock{display:grid;place-items:center;width:52px;height:52px;border-radius:50%;background:#dcebdd;font-size:24px}
    h1{margin:18px 0 8px;font:500 30px Georgia,serif}p{color:#69726d;line-height:1.6}
    input,button{width:100%;height:48px;border-radius:11px;font:inherit}input{margin:10px 0;border:1px solid #cfd7d1;padding:0 14px;outline:none}
    input:focus{border-color:#245c42;box-shadow:0 0 0 3px #245c4220}button{border:0;background:#245c42;color:white;font-weight:750;cursor:pointer}
    #error{min-height:20px;margin:10px 0 0;color:#a22c29;font-size:14px}
  </style>
</head>
<body>
  <!-- HTML_SHARE_ENCRYPTED_V1 -->
  <main>
    <div class="lock">🔒</div>
    <h1>此頁面需要密碼</h1>
    <p>輸入分享者提供的密碼後，內容會在你的瀏覽器中解密。</p>
    <form id="unlock">
      <input id="password" type="password" autocomplete="current-password" placeholder="請輸入密碼" autofocus>
      <button>開啟頁面</button>
      <div id="error"></div>
    </form>
  </main>
  <script>
    const payload="CKwgO+8cJVEA220OieNEhHZjY3lC+Kahp6gZoNPhHhQ69olQiVh0Ky43z87MbHVZdEaGMrAtQVXs5YNOWQ==",salt="PKweSjruOq8f2KfU2r8f6w==",iv="Kg6cRvGKWdOGoRlg";
    const bytes=b=>Uint8Array.from(atob(b),c=>c.charCodeAt(0));
    document.querySelector("#unlock").addEventListener("submit",async event=>{
      event.preventDefault();
      const error=document.querySelector("#error");
      error.textContent="正在解密…";
      try{
        const material=await crypto.subtle.importKey("raw",new TextEncoder().encode(document.querySelector("#password").value),"PBKDF2",false,["deriveKey"]);
        const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:bytes(salt),iterations:210000,hash:"SHA-256"},material,{name:"AES-GCM",length:256},false,["decrypt"]);
        const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:bytes(iv)},key,bytes(payload));
        document.open();document.write(new TextDecoder().decode(plain));document.close();
      }catch{error.textContent="密碼錯誤，請再試一次。"}
    });
  </script>
</body>
</html>
